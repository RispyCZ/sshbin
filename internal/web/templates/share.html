{{define "title"}}{{.Sharing.FileName}} — Filedrop{{end}}
{{define "content"}}
<section class="card">
  <h1>Shared file</h1>
  <p class="file-name">{{.Sharing.FileName}}</p>
  <dl class="meta">
    {{if .Sharing.ExpiresAt}}<dt>Expires</dt><dd>{{.Sharing.ExpiresAt.Format "2006-01-02 15:04 MST"}}</dd>{{end}}
    {{if .Sharing.HasPassword}}<dt>Protected</dt><dd>Password required</dd>{{end}}
  </dl>
  <a class="btn-primary" href="{{.DownloadURL}}" download>Download</a>
</section>
{{end}}
