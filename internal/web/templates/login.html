{{define "title"}}Sign in — Filedrop{{end}}
{{define "content"}}
<section class="card narrow">
  <h1>Sign in</h1>
  <p class="lead">We'll email you a one-time code.</p>
  {{if .Error}}<div class="notice error-notice">{{.Error}}</div>{{end}}
  <form method="post" action="/login" class="settings-form">
    <input type="hidden" name="next" value="{{.Next}}">
    <label class="field">
      <span>Email</span>
      <input type="email" name="email" required autofocus autocomplete="email" placeholder="you@example.com">
    </label>
    <button type="submit" class="btn-primary">Send code</button>
  </form>
</section>
{{end}}
