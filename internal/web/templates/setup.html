{{define "title"}}Configure share — sshbin{{end}}
{{define "content"}}
<section class="card">
  <h1>Configure share</h1>
  <p class="file-name">{{.Sharing.FileName}}</p>

  {{if .Saved}}
  <sb-notice type="success">
    <p>Saved. Share this link:</p>
    <sb-share-link value="{{.ShareURL}}"></sb-share-link>
  </sb-notice>
  {{end}}

  <sb-setup-modal inline
    share-id="{{.Sharing.ID}}" file-name="{{.Sharing.FileName}}"
    expires="{{.Expires}}" emails="{{.Emails}}"
    {{if .Sharing.Public}}is-public{{end}}
    {{if .Sharing.HasPassword}}has-password{{end}}
    {{if .Sharing.Configured}}configured{{end}}></sb-setup-modal>
</section>
{{end}}
