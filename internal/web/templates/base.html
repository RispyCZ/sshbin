{{define "base.html" -}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}Sshbin{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">sshbin</a>
    {{if .Session}}
    <div class="user-menu">
      <button class="user-toggle" type="button" aria-expanded="false" aria-haspopup="true">
        <span class="user-avatar">{{slice .Session.Email 0 1}}</span>
        <span class="user-email">{{.Session.Email}}</span>
        <svg class="chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="user-dropdown" hidden>
        <span class="dropdown-email">{{.Session.Email}}</span>
        <form method="post" action="/logout">
          <button type="submit" class="dropdown-item">Sign out</button>
        </form>
      </div>
    </div>
    {{else}}
    <a class="btn-signin" href="/login">Sign in</a>
    {{end}}
  </header>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
  <footer class="site-footer">
    <span>Share files from any server over plain SSH.</span>
  </footer>
  <script src="/static/app.js" defer></script>
</body>
</html>
{{- end}}
