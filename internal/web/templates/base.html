{{define "base.html" -}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}sshbin{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>(function(){var t=localStorage.getItem("theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t)})();</script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">sshbin</a>
    <div class="header-end">
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
        <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      {{if .Session}}
      <sb-user-menu email="{{.Session.Email}}"></sb-user-menu>
      {{else}}
      <a class="btn-signin" href="/login">Sign in</a>
      {{end}}
    </div>
  </header>
  <main class="{{block "container-class" .}}container{{end}}">
    {{block "content" .}}{{end}}
  </main>
  <sb-toast></sb-toast>
  <footer class="site-footer">
    <span>Share files from any server over plain SSH.</span>
  </footer>
  <script src="/static/app.js" defer></script>
  <script type="module" src="/static/components/sb-notice.js"></script>
  <script type="module" src="/static/components/sb-otp.js"></script>
  <script type="module" src="/static/components/sb-share-link.js"></script>
  <script type="module" src="/static/components/sb-user-menu.js"></script>
  <script type="module" src="/static/components/sb-toast.js"></script>
  <script type="module" src="/static/components/sb-share-modal.js"></script>
</body>
</html>
{{- end}}
