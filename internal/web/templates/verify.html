{{define "title"}}Enter code — sshbin{{end}}
{{define "content"}}
<section class="card narrow otp-card">
  <h1 class="otp-title">OTP Verification</h1>
  <p class="otp-subtitle">Code has been sent to <span class="otp-email">{{.MaskedEmail}}</span></p>
  {{if .Error}}<div class="notice error-notice">{{.Error}}</div>{{end}}
  <form method="post" action="/verify" id="otp-form">
    <input type="hidden" name="email" value="{{.Email}}">
    <input type="hidden" name="next" value="{{.Next}}">
    <input type="hidden" name="code" id="otp-value">
    <div class="otp-container">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 2">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 3">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 4">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 5">
      <input class="otp-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 6">
    </div>
    <p class="otp-hint" id="otp-hint">Enter code to continue</p>
  </form>
  <form method="post" action="/login" class="resend">
    <input type="hidden" name="email" value="{{.Email}}">
    <input type="hidden" name="next" value="{{.Next}}">
    <button type="submit" class="btn-link">Resend code</button>
  </form>
</section>
{{end}}
