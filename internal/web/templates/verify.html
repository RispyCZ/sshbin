{{define "title"}}Enter code — sshbin{{end}}
{{define "content"}}
<section class="card narrow center">
  <h1>Enter your code</h1>
  <p class="lead">Sent to <span class="otp-email">{{.MaskedEmail}}</span></p>
  {{if .Error}}<sb-notice type="error">{{.Error}}</sb-notice>{{end}}
  <form method="post" action="/verify" id="otp-form">
    <input type="hidden" name="email" value="{{.Email}}">
    <input type="hidden" name="next" value="{{.Next}}">
    <input type="hidden" name="code" id="otp-value">
    <sb-otp digits="6" form-id="otp-form" value-input-id="otp-value"></sb-otp>
  </form>
  <div class="auth-actions">
    <form method="post" action="/login">
      <input type="hidden" name="email" value="{{.Email}}">
      <input type="hidden" name="next" value="{{.Next}}">
      <button type="submit" class="btn-link"><span class="material-icons">refresh</span>Resend code</button>
    </form>
    <span class="auth-sep" aria-hidden="true">·</span>
    <a href="/login" class="btn-link"><span class="material-icons">arrow_back</span>Back to sign in</a>
  </div>
</section>
{{end}}
